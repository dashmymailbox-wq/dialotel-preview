<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <!-- Halo rose — haut gauche -->
  <defs>
    <radialGradient id="halo-rose" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ed8ce6" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#ed8ce6" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#ed8ce6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo-jaune" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e2ed77" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#e2ed77" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#e2ed77" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo-violet" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3c1450" stop-opacity="0.18"/>
      <stop offset="70%" stop-color="#3c1450" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#3c1450" stop-opacity="0"/>
    </radialGradient>
    <!-- Versions claires -->
    <radialGradient id="halo-rose-light" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c75fb8" stop-opacity="0.07"/>
      <stop offset="60%" stop-color="#c75fb8" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#c75fb8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo-jaune-light" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b8c42e" stop-opacity="0.05"/>
      <stop offset="50%" stop-color="#b8c42e" stop-opacity="0.01"/>
      <stop offset="100%" stop-color="#b8c42e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo-violet-light" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b48cdc" stop-opacity="0.1"/>
      <stop offset="70%" stop-color="#b48cdc" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#b48cdc" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Couche sombre (visible par defaut) -->
  <g class="cosmic-dark">
    <ellipse cx="160" cy="80" rx="320" ry="240" fill="url(#halo-rose)"/>
    <ellipse cx="640" cy="720" rx="240" ry="320" fill="url(#halo-jaune)"/>
    <ellipse cx="400" cy="400" rx="200" ry="200" fill="url(#halo-violet)"/>
  </g>

  <!-- Couche claire (visible en mode light via CSS) -->
  <g class="cosmic-light" opacity="0">
    <ellipse cx="160" cy="80" rx="320" ry="240" fill="url(#halo-rose-light)"/>
    <ellipse cx="640" cy="720" rx="240" ry="320" fill="url(#halo-jaune-light)"/>
    <ellipse cx="400" cy="400" rx="200" ry="200" fill="url(#halo-violet-light)"/>
  </g>
</svg>
